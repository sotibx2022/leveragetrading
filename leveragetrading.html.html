<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Binance Futures PnL Calculator</title>

<style>
    body {
        margin: 0;
        font-family: Arial, sans-serif;
        background-color: #0b0e11;
        color: #eaecef;
        display: flex;
        justify-content: center;
        align-items: center;
        min-height: 100vh;
    }

    .container {
        background: #161a1e;
        padding: 30px;
        border-radius: 12px;
        width: 100%;
        max-width: 450px;
        box-shadow: 0 0 25px rgba(240,185,11,0.15);
    }

    h2 {
        text-align: center;
        color: #f0b90b;
        margin-bottom: 25px;
    }

    label {
        font-size: 14px;
        margin-bottom: 6px;
        display: block;
    }

    input, select {
        width: 100%;
        padding: 10px;
        margin-bottom: 18px;
        border-radius: 6px;
        border: none;
        outline: none;
        background: #1e2329;
        color: #fff;
    }

    button {
        width: 100%;
        padding: 12px;
        background: #f0b90b;
        border: none;
        border-radius: 6px;
        font-weight: bold;
        cursor: pointer;
        transition: 0.3s;
    }

    button:hover {
        background: #dcae06;
    }

    .result {
        margin-top: 25px;
        padding: 15px;
        border-radius: 8px;
        background: #1e2329;
        display: none;
        transform: translateY(10px);
        opacity: 0;
        transition: all 0.4s ease;
    }

    .result.show {
        display: block;
        transform: translateY(0);
        opacity: 1;
    }

    .profit {
        color: #0ecb81;
        font-weight: bold;
    }

    .loss {
        color: #f6465d;
        font-weight: bold;
    }

    @media (max-width: 500px) {
        .container {
            margin: 15px;
            padding: 20px;
        }
    }
</style>
</head>

<body>

<div class="container">
    <h2>Binance Futures PnL Calculator</h2>

    <label>Capital Investment (USDT)</label>
    <input type="number" id="capital" placeholder="Enter capital">

    <label>Leverage (e.g., 10 for 10x)</label>
    <input type="number" id="leverage" placeholder="Enter leverage">

    <label>Entry Price</label>
    <input type="number" id="entry" placeholder="Enter entry price">

    <label>Exit Price</label>
    <input type="number" id="exit" placeholder="Enter exit price">

    <label>Position Type</label>
    <select id="position">
        <option value="long">Long</option>
        <option value="short">Short</option>
    </select>

    <button onclick="calculatePnL()">Calculate</button>

    <div class="result" id="result">
        <p><strong>Position Size:</strong> <span id="positionSize"></span> USDT</p>
        <p><strong>Profit / Loss:</strong> <span id="pnl"></span></p>
        <p><strong>ROI:</strong> <span id="roi"></span>%</p>
    </div>
</div>

<script>
function calculatePnL() {
    const capital = parseFloat(document.getElementById('capital').value);
    const leverage = parseFloat(document.getElementById('leverage').value);
    const entry = parseFloat(document.getElementById('entry').value);
    const exit = parseFloat(document.getElementById('exit').value);
    const position = document.getElementById('position').value;

    if (!capital || !leverage || !entry || !exit) {
        alert("Please fill all fields correctly.");
        return;
    }

    const positionSize = capital * leverage;
    let pnl = 0;

    if (position === "long") {
        pnl = ((exit - entry) / entry) * positionSize;
    } else {
        pnl = ((entry - exit) / entry) * positionSize;
    }

    const roi = (pnl / capital) * 100;

    document.getElementById('positionSize').innerText = positionSize.toFixed(2);

    const pnlElement = document.getElementById('pnl');
    pnlElement.innerText = pnl.toFixed(2) + " USDT";

    if (pnl >= 0) {
        pnlElement.className = "profit";
    } else {
        pnlElement.className = "loss";
    }

    document.getElementById('roi').innerText = roi.toFixed(2);

    const resultBox = document.getElementById('result');
    resultBox.classList.add("show");
}
</script>

</body>
</html>
